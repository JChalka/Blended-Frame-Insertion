; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Build all:          pio run
; Build one:          pio run -e FrameworkDemo
; Build demos only:   pio run -e FrameworkDemo -e RGB16InputDemo ...

; =============================================================================
; Shared defaults
; =============================================================================

[platformio]
default_envs =
    HyperTeensy
    Calibration
    FrameworkDemo
    RGB16InputDemo
    ColorCalibrationABDemo
    PrecomputeDemo
    rgbwNoExtractionDemo
    True16RGBWGradientDemo
    TemporalFastLEDDemo
    PackedBFIMapDemo
    CubeLUT3DDemo
    ESP32S3_DoubleBuffer
    LoadPrecomputedDemo

[teensy40_base]
platform  = teensy
board     = teensy40
framework = arduino
board_build.f_cpu = 816000000L
extra_scripts =
    pre:select_example.py
    post:build_report.py
    post:tools_compile_check.py
lib_deps  =
    TemporalBFI=symlink://./
build_flags =
    -D TEENSY_OPT_FASTEST_LTO

; =============================================================================
; Production sketches
; =============================================================================

[env:HyperTeensy]
extends   = teensy40_base
extra_scripts =
    pre:select_example.py
    pre:extra_usb_desc.py
    post:build_report.py
    post:tools_compile_check.py
lib_deps  =
    ${teensy40_base.lib_deps}
    https://github.com/KurtMF/ObjectFLED
build_flags =
    ${teensy40_base.build_flags}
    -D USB_RAWHID_SERIAL

[env:Calibration]
extends   = teensy40_base
lib_deps  =
    ${teensy40_base.lib_deps}
    https://github.com/KurtMF/ObjectFLED

; =============================================================================
; Demo / example sketches (library-only, no external deps)
; =============================================================================

[demo_base]
extends   = teensy40_base

[env:FrameworkDemo]
extends   = demo_base

[env:RGB16InputDemo]
extends   = demo_base

[env:ColorCalibrationABDemo]
extends   = demo_base

[env:PrecomputeDemo]
extends   = demo_base

[env:rgbwNoExtractionDemo]
extends   = demo_base

[env:True16RGBWGradientDemo]
extends   = demo_base

[env:TemporalFastLEDDemo]
extends   = demo_base
lib_deps  =
    ${demo_base.lib_deps}
    fastled/FastLED

[env:PackedBFIMapDemo]
extends   = demo_base

[env:CubeLUT3DDemo]
extends   = demo_base
board     = teensy41

[env:LoadPrecomputedDemo]
extends   = demo_base
build_flags =
    ${demo_base.build_flags}
    -D TEMPORAL_BFI_PRECOMPUTED_ONLY

; =============================================================================
; ESP32-S3 examples
; =============================================================================

[esp32s3_base]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board     = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_upload.flash_size = 16MB
build_flags =
    -DBOARD_HAS_PSRAM
extra_scripts =
    pre:select_example.py
    post:build_report.py
lib_deps  =
    TemporalBFI=symlink://./

[env:ESP32S3_DoubleBuffer]
extends   = esp32s3_base
lib_deps  =
    ${esp32s3_base.lib_deps}
    fastled/FastLED

